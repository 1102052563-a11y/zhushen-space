<div class="mw-heading mw-heading2"><h2 id="参考作品"><span id=".E5.8F.82.E8.80.83.E4.BD.9C.E5.93.81"></span>参考作品</h2></div>
<p>作品主体受到了由<ruby><rb data-id="template-ruby">索尼电脑娱乐<span class="template-ruby-hidden">（</span></rb><rt style="font-size:0.75em">SCE</rt><span class="template-ruby-hidden">）</span></ruby>（现<ruby><rb data-id="template-ruby">索尼互动娱乐<span class="template-ruby-hidden">（</span></rb><rt style="font-size:0.75em">SIE</rt><span class="template-ruby-hidden">）</span></ruby>）所制作的《<a href="/%E6%AD%BB%E9%AD%82%E6%9B%B2%E7%B3%BB%E5%88%97" title="死魂曲系列">死魂曲</a>》系列影响，并体现在了故事结构、设定与“记录”上，除此之外，亦参考了《杀戮轮回》。 角色方面参考了《龙珠超：布罗利》、《疯狂的麦克斯：狂暴之路》、《终结者: 黑暗命运》和《战国鬼才传》。<sup id="cite_ref-3" class="reference"><a href="#cite_note-3"><span class="cite-bracket">&#91;</span>3<span class="cite-bracket">&#93;</span></a></sup>

<div class="mw-heading mw-heading4"><h4 id="影子"><span id=".E5.BD.B1.E5.AD.90"></span>影子</h4></div>
<ul><li><a href="/%E5%B0%8F%E8%88%9F%E6%BD%AE#影子潮" title="小舟潮">影子潮</a>（<span lang="ja">ウシオ</span>）：小舟潮的影子，女主角。于小舟潮逝世三天前（7月18日）复制。</li></ul>
<ul><li><a href="/%E5%B0%8F%E8%88%9F%E6%BE%AA#影子澪" title="小舟澪">影子澪</a>（<span lang="ja">ミオ</span>）：小舟澪的影子。于小舟潮逝世当晚（7月21日）守夜时由波稻复制，比小舟澪更无表情一些。</li></ul>
<ul><li><a href="/%E6%B3%A2%E7%A8%BB" title="波稻">影子诗织</a>（<span lang="ja">シオリ</span>）：小早川诗织的影子，即波稻。</li></ul>
<ul><li><a href="/%E6%B3%A2%E7%A8%BB" title="波稻">波稻</a>（<span lang="ja">ハイネ</span>）：穿着和服的女孩，被影子们称为“母亲”。可以像电波一样对其他影子传达命令，可以依靠自己的眼睛进行时间穿越，且穿越时能够携带已经复制的信息。1732年享保大饥荒作为鲸鱼被冲上岸，波稻是当时复制的渔民的女儿的名字。据慎平猜测本体可能来自陨石，坠入海洋后不断复制为海洋生物。目的是回到影子的故乡。</li></ul>
<ul><li>四手／纸垂（<span lang="ja">シデ</span>）：四只眼、四只手的影子，身材高大。<span title="你知道的太多了" class="heimu">真身是菱形医院最早的院长菱形纸垂彦，每一代都由波稻将自己的人格和记忆复制到自己和波稻的孩子身上，直到这一代日都神社宫司雁切真砂人。</span></li></ul>
<ul><li>影子龙之介（<span lang="ja">リュウノスケ</span>）：南方龙之介的影子。十四年前十五岁生日那天在鹰巢山被波稻杀死并复制，因为一些原因被打印到双胞胎姐姐日鹤身上，且自己的存在向未来偏移了2秒。</li></ul>
<ul><li>罗森克兰茨（<span lang="ja">ローゼンクランツ</span>）、吉尔登斯特恩（<span lang="ja">ギルデンスターン</span>）：由朱鹭子控制的非人<sup id="cite_ref-4" class="reference"><a href="#cite_note-4"><span class="cite-bracket">&#91;</span>4<span class="cite-bracket">&#93;</span></a></sup>，战斗力强大。留着口水的是吉尔，右手受伤在生气的是罗森<sup id="cite_ref-5" class="reference"><a href="#cite_note-5"><span class="cite-bracket">&#91;</span>5<span class="cite-bracket">&#93;</span></a></sup>。</li></ul>
<ul><li>影子慎平：由三周目影子诗织复制的影子，并由波稻实际操控着，让主角团陷入困境。有不得到眼前问题的答案就会陷入纠结的缺点。</li></ul>
<ul><li>影子人渊佳苗：通称阿渊，是岛上的老师。曾经因为小舟潮教训嘲笑者，而耐心教育过她，是她心灵上的导师。但在故事中被复制并遭到杀害。</li></ul>
<ul><li>影子子垣内：日都神社工作人员，在雁切真砂人“上厕所”<span title="你知道的太多了" class="heimu">阻击慎平、潮他们一行人入侵蛭子洞</span>时代为主持夏日祭活动。在故事中实际已经被复制并遭到杀害。</li></ul>
<ul><li>影子哲：二周目酱油角色。影子澪杀害凸村哲后“分娩”出的影子。</li></ul>
<ul><li>影子艾伦：最快便当影子角色。尾随人类艾伦上厕所准备袭击对方时，被南云老师一锤砸死。</li></ul>
<ul><li>影子银次郎：故事14年前，救南方日鹤时<span title="你知道的太多了" class="heimu">南方日鹤见到弟弟龙之介被波稻袭击杀害</span>被野生影子复制，但后来被附身于南方日鹤的龙之介干掉。人类银次郎因此“免疫”了“影子病”。</li></ul>
<ul><li>影子根来：菱形医院的护士。日都岛年均4人死亡，无论生病还是事故，均暗地里交给根来处理。<span title="你知道的太多了" class="heimu">而后根来将尸体交给营养不良的波稻食用。在波稻的命令下膨大并攻击影子潮一行人，最后被扫描完本体的影子潮一拳打爆。</span></li></ul>
<div class="mw-heading mw-heading3"><h3 id="用语剧情"><span id=".E7.94.A8.E8.AF.AD.E5.89.A7.E6.83.85"></span>用语剧情</h3></div>
<div class="mw-heading mw-heading4"><h4 id="影子设定"><span id=".E5.BD.B1.E5.AD.90.E8.AE.BE.E5.AE.9A"></span>影子设定</h4></div>
<p>影子的本体是平面，受到伤害后除重新复制外不能恢复，立体的身体只是某种投影，受到伤害后可以立即复原（但也会感到疼痛）。将立体收入影子后可以高速移动，但潜入影子无法呼吸。
</p><p>影子以情报为食。
</p><p>不用睡觉、不用大小便。但有其他正常的生理现象。
</p><p>不会因时间而老化，但反复变身的影子复制的精度会劣化或其他原因（例如：受到多次致命损伤等）导致数据损伤，起初会出现幼化、人格障碍、记忆障碍等数据错误，最后不能进行人类的拟态失去自我，会远离人烟成为野生影子，直至最终变成一团黑泥。
</p><p>影子的能力有：
</p>
<ul><li>复制（<span lang="ja">コピー</span>）：等同于扫描和打印。使用后被消耗的物体经消除可以重新打印，但被破坏的物体扫描的数据将消失。</li>
<li>扫描（<span lang="ja">スキャン</span>）：发光并读取对象，发光时的数秒内不能移动。扫描的数据量取决于对象构造的复杂程度，越复杂越慢。扫描的内容可以是人的DNA或记忆。扫描的数据在其他的时间线内依然有效（仅限波稻和影子潮）。</li>
<li>打印（<span lang="ja">プリント</span>）：以扫描的数据基础制造影子。影子可以用自己的身体或身体的一部分（如头发）打印。从一个数据中可以同时打印的物体只有一个。影子打印其他影子被称为“分娩”，波稻以外的影子只能进行一次分娩，分娩出来的影子可以自行行动。影子可以被其他扫描，但不能被打印。</li>
<li>消去（<span lang="ja">消去</span>）：将扫描的数据取出来后用身体的一部分触碰被复制的本体可以将其消去。若本体贴在地面消去后会在地上留下黑色的痕迹。对于人类必须死后才能消去。若不消去，对应的数据最终将会消失。对使用电力等能源的机械类影子不消去本体则影子无法被使用。</li>
<li>大脑：用来保存通过扫描读取的数据。每个影子的脑容量不同。如果超出脑容量复制对象就会导致覆盖数据，覆盖数据是随机的。</li>
<li>平面化：可以将立体的部分收入影子中，进行时速50km/h的高速移动。能穿过缝隙（只要光线能射入的缝隙都可以进入）。能在墙上移动。潜入影子期间无法呼吸。</li></ul>

<ul><li>10:45 慎平和孩子们回到洋食店。慎平救出了被澪困在房间里的影子澪</li></ul>
<dl><dd>与此同时 日鹤与化身为四手的纸垂激战，龙之介骇入纸垂的泥中获得了身体，朱鹭子加入战局</dd></dl>
<ul><li>10:50 朱鹭子受致命伤，根津和凸村哲帮她从虎岛逃出</li></ul>
<dl><dd>与此同时 慎平接到影子慎平（波稻）打来的电话，让他在日鹤和澪、窗之间选一个来救</dd></dl>
<ul><li>10:55 慎平、影子澪在亚伦的田里遇到雁切</li>
<li>11:00 影子澪杀掉纸垂，发现纸垂体内完全没有数据，与此同时，澪在蛭子洞被波稻杀死</li>
<li>11:05 慎平、影子澪与朱鹭子会合，朱鹭子让两人快去虎岛帮日鹤后死去。慎平从朱鹭子那里拿到菱形医生的只剩一发子弹的手枪后自杀</li></ul>
<hr />
<p>八周目结束，进入九周目
</p>

<td>
<p><b>2018年7月23日</b>（周一）
</p>
<ul><li>10:11 慎平在下山的路上<span style="color:red;">醒来</span></li>
<li>10:35 慎平和孩子们回到洋食店。慎平救出了被澪困在房间里的影子澪</li>
<li>10:39 慎平和影子澪一起拦住前往亚伦的田的澪、窗后前往虎岛与日鹤会合</li>
<li>10:45 慎平和影子澪刚好赶上朱鹭子加入战局，罗森被纸垂秒杀，日鹤已被纸垂刺倒。在慎平兜里的贝壳项链闪光后波稻和纸垂突然离开，日鹤在死前将龙之介托付给慎平</li>
<li>16:00许 菱形青铜向慎平告知有两个纸垂的原因。影子澪发现贝壳项链里有影子潮的记忆，慎平意识到明天（24日）影子潮可能会和三周目一样在万年青滨出现<sup id="cite_ref-30" class="reference"><a href="#cite_note-30"><span class="cite-bracket">&#91;</span>30<span class="cite-bracket">&#93;</span></a></sup></li>
<li>21:00许 窗再次向澪表白，被拒绝。澪向慎平表白，被拒绝</li></ul>
<p><b>2018年7月24日</b>（周二）
</p>
<ul><li>03:00许 早潮，一直在海中的影子潮接近日都岛，影子潮留下的贝壳项链发生振动，慎平确信影子潮还在海中</li>
<li>之后 作战会议，确定在晚潮的18点许夺回影子潮</li>
<li>16:00许 雁切正常主持活动，波稻发现找不到慎平，怀疑他藏在野生影子中</li>
<li>18:00许 藏在野生影子吉尔里的慎平在海里被纸垂发现，但还是抢在纸垂前接触了影子潮，并通过贝壳项链让影子潮获得了三周目到七周目的记忆</li>
<li>紧随其后 影子潮通过在用头发切割纸垂用野生影子做的铠甲时骇入，压制了纸垂，但在影子潮准备给予纸垂下一次攻击时被影子澪阻止。慎平开枪自杀，虽然纸垂击中慎平手中枪的扳机试图阻止，但慎平通过影子龙之介的能力躲过了这一击，成功自杀</li></ul>
<hr />
<p>九周目结束，影子潮和慎平一起进入十周目
</p>

<th>十周目</th>
</tr>
<tr>
<td>
<p><b>2018年7月24日</b>（周二）
</p>
<ul><li>16：50 慎平在蛭子洞入口<span style="color:red;">醒来</span>，成功将影子潮（九周目，并携带四至七周目记忆）带回，乘吉尔前往洞穴深处</li>
<li>同时，雁切与波稻察觉情况，雁切诈病前往追击</li>
<li>几分钟后，路遇野生影子被波稻唤醒袭击，朱鹭子断后，其余人继续向前，到达蛭子洞穴深处，遇到蛭子本体所形成的墙（结界）堵住去路，影子潮贸然破解导致手部受伤，影子澪赶到利用复制的烟花炸开围墙。</li>
<li>纸垂追至，交战后结界正在恢复，根津决意留下断后，慎平一行突入结界后结界恢复。</li>
<li>进入结界后，影子潮帮慎平平息波稻的信号，影子潮准备用拳击打波稻的本体，纸垂和波稻从岩缝突入，与影子潮激战，慎平利用波稻会关注他来让影子澪刺杀但失准，然后让窗偷袭映射在绳结上的影子头部成功，再被影子澪砍成两半。纸垂愤怒之下也被影子潮击中下巴。</li>
<li>结界外的纸垂撕破结界，与结界内的纸垂融合，试图突破最后挣扎。影子潮直接冲向波稻本体，即使波稻试图哀求停手，但影子潮还是一拳击中波稻的影子上。</li>
<li>纸垂的影子铠甲消失，影子澪补刀了纸垂肉体。但纸垂再次出现——实际上波稻的右眼原来在影子潮那里，并且通过未来传递给慎平，并处于沉睡状态（因此波稻以为是破碎数据而无法发现），直到现在才觉醒。纸垂对已经失去右眼力量的波稻十分失望，并从波稻的影子上打开一个空间门进去，慎平和影子潮跟上。另一方面，根津被影子潮头发生成的保护罩保住没事，朱鹭子也安全追上，影子澪留意到岛上的影子开始失去控制，众人决定从纸垂之前突入的岩缝出去救援。</li>
<li>慎平和影子潮来到了影子的故乡——和日都岛十分相似，由于身体损伤，慎平让龙之介控制身体，跟随着少女波稻的滚球来到神社，见到影子潮和影子波稻缠在一起。在之前日鹤曾推测过现在的影子潮的泥是带有波稻的泥，担心影子潮会因此失去自我，约定让龙之介发现不妥就要杀死影子潮，但慎平阻止了龙之介，影子潮也恢复正常，道明了那是波稻的善良人格，并让善良波稻实体出来。</li>
<li>善波稻道出他们所来之处为“常夜”，影子潮表示在七周目的最后扫描纸垂时得知他打算抹杀世界。纸垂想通过控制劫持的蛭子（恶波稻）记忆来产生空袭，以消灭影子潮来最终获得觉醒的右眼，而要返回现世则要消灭纸垂手上的蛭子。</li>
<li>影子潮和纸垂在空袭的飞机激战，影子潮成功突入将蛭子记忆中空袭消去来停止空袭，但自身也受到重伤无法活动。影子潮让慎平和龙之介争取时间生成“入侵弹”，最后赶上，让慎平将“入侵弹”打入纸垂的铠甲中，将铠甲和留在外面操纵本体的纸垂本体一并消除。</li>
<li>纸垂被消灭后，影子潮等人通过蛭子回到300年前影子登陆的时间，抹除掉影子事件发生的根源（慎平干涉了历史，阻止了波稻接触影子鲸鱼；影子潮将影子鲸鱼消除）。影子的根源消失，善波稻、影子龙之介、影子潮的存在也开始消失，善波稻和影子龙之介相互决定成为一辈子的朋友，影子潮和慎平道别后，三个影子消失。
<ul><li>影子潮乘着未完全消亡之际，在时空的间隙处：给南方日鹤留下了关于回岛、慎平的录音信息，对应第21话；给处于时间间隙时的慎平来自影子波稻观察时间的力量；给第一话时的慎平道别。</li></ul></li></ul>
<hr />
<p>历史完全重置，影子事件消失。
</p>

<li>潮在夏日祭典上回忆起了影子潮经历过的事，对慎平说出“欢迎回家”。</li></ul>

<div class="TabContentText">
<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">01</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">再见，夏天</span></div>
<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">
<div style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; margin: 15px;"><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/6/6e/Summertime_story_1-1.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/c/c9/Summertime_story_1-2.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/3/39/Summertime_story_1-3.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/8/8b/Summertime_story_1-4.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/9/93/Summertime_story_1-5.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/9/96/Summertime_story_1-6.jpg" class="moe-img-function" loading="lazy" /></div>
<div style="display: none;"><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-1.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/6/6e/Summertime_story_1-1.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-2.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/c9/Summertime_story_1-2.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-3.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/3/39/Summertime_story_1-3.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-4.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/8/8b/Summertime_story_1-4.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-5.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/9/93/Summertime_story_1-5.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_1-6.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/9/96/Summertime_story_1-6.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>在听闻青梅竹马的小舟潮的讣告后，网代慎平时隔2年回到了故乡和歌山市『日都岛』。<br />
参加葬礼的慎平被好友菱形窗告知“潮有他杀的可能性”。<br />
甚至连潮的妹妹澪也称潮是被杀死的。<br />
在日都岛上，流传着如果看到和自己有着相同样子的「影子」就会死掉的传说。<br />
而据说在生前，澪看到了潮的「影子」——。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">02</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">影子</span></div>
<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">
<div style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; margin: 15px;"><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/8/8a/Summertime_story_2-1.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/d/db/Summertime_story_2-2.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/3/3f/Summertime_story_2-3.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/b/b6/Summertime_story_2-4.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/7/72/Summertime_story_2-5.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/6/6d/Summertime_story_2-6.jpg" class="moe-img-function" loading="lazy" /></div>
<div style="display: none;"><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-1.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/8/8a/Summertime_story_2-1.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-2.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/d/db/Summertime_story_2-2.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-3.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/3/3f/Summertime_story_2-3.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-4.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/b/b6/Summertime_story_2-4.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-5.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/7/72/Summertime_story_2-5.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_2-6.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/6/6d/Summertime_story_2-6.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>慎平被本来应该是被澪的「影子」用枪爆了头，但在意识恢复后，他发现自己位于开往日都岛的渡轮上。<br />
而且之后「同被枪击前一样」的事件也重复发生。<br />
独自思考着的慎平，目击了驻扎在岛上的凸村被澪用菜刀刺杀的现场。<br />
此外，他还目睹了从被杀的凸村中生成凸村的「影子」的场景。<br />
在对眼前发生的事情感到震惊的慎平面前，拿着菜刀的澪的身影——。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">03</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">漂流</span></div>
<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">
<div style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; margin: 15px;"><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/2/2c/Summertime_story_3-1.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/5/50/Summertime_story_3-2.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/a/a4/Summertime_story_3-3.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/c/cf/Summertime_story_3-4.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/c/cf/Summertime_story_3-5.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/3/3e/Summertime_story_3-6.jpg" class="moe-img-function" loading="lazy" /></div>
<div style="display: none;"><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-1.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/2/2c/Summertime_story_3-1.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-2.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/5/50/Summertime_story_3-2.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-3.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/a/a4/Summertime_story_3-3.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-4.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/cf/Summertime_story_3-4.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-5.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/cf/Summertime_story_3-5.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_3-6.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/3/3e/Summertime_story_3-6.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>被澪的「影子」刺杀的慎平再次回到了7月22日。<br />
为了探明「影子」的真相，慎平造访了在潮的葬礼举行的次日全家失踪的小早川家，并遭遇了造成潮的事故的少女·小早川诗织的「影子」。<br />
慎平勉强保住了一命，无计可施的他将这一切全都告诉了窗。<br />
时间来到7月24日，日都岛的夏日祭。度过了转瞬而逝的安稳时间的慎平——。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">04</span> <span style="font-size: 28.8px; color: black; font-weight: bold;"><ruby><rb data-id="template-ruby">未视感<span class="template-ruby-hidden">（</span></rb><rt style="font-size:0.75em">Jamais Vu</rt><span class="template-ruby-hidden">）</span></ruby></span></div>

"1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>夏祭的夜晚，潮的「影子」出现在了慎平面前。<br />
虽然慎平对与其他「影子」不同、就像是生前的潮本人一样行动的她感到混乱，但他在与应该再也见不了面的潮的对话时却难掩喜悦之情。<br />
为了不被警惕着「影子」的澪和窗发现，慎平藏起了潮，但想见到妹妹等人的潮却感到不满。<br />
之后，在为了和窗他们汇合而前往蛭子大人那里的慎平面前，「影子」澪再次出现。
</p>

"1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>把慎平从危机中解救出来的是同乘一艘渡轮的女性。<br />
她自称慎平敬爱的作家南云龙之介来帮助「网代慎平」。<br />
而且她对「影子」具备了众多的知识。<br />
另一方面，在夏日祭的场所内,「影子」进行了大规模的屠杀。<br />
慎平虽然前去帮忙，但是朋友们陆续被杀害。<br />
不久，「影子」吞噬了岛上的人们——。
</p>

"1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>第四次的7月22日。<br />
和慎平在渡船上相遇并告诉他「南云龙之介」名字的是一位叫南方日鹤的女性。<br />
她也是以日都岛为故乡，她为了解开手机上留下的神秘信息，时隔14年重返故乡。<br />
知道「影子」和「波稻」的存在的日鹤，与猎人根津会合，了解到了很多岛民都被换成了「影子」。
</p>

<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>日鹤阅读了慎平编写的循环记录，确认了发生在他身上的事是真实的。<br />
她曾经的经历，使得她有理由相信慎平的故事。<br />
以免冒着被「影子」知道的风险，日鹤没有多说，但她说会助慎平一力。<br />
为了打败小早川家的「影子」，慎平、日鹤和根津前往小早川家。 三人成功捕获了诗织的「影子」，但——。
</p>

<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>为了打倒在一周目出现的澪的「影子」，慎平在日鹤与根津的守护下回到了小舟家。<br />
但是，「本不该出现」的潮却又一次现身。潮和慎平一样，从24日的夏祭穿越了回来。<br />
被突如其来的变故震惊到的慎平想要整理状况，却意外得遭到了澪的「影子」的袭击。<br />
而在潮的帮助下，慎平得以幸免于难，但取而代之的是潮被割开的手臂。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">09</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">流吧我的眼泪</span></div>

"1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>潮遗留的手机里留下了一个视频文件，里面同时拍下了潮与潮的「影子」。<br />
两人开始讲述从相遇到留下视频的过程。<br />
虽然对不怀疑自己是“真的”潮的「影子」感到困惑，但不久便一起合作探寻起「影子」的真相。<br />
看了视频后恢复了全部记忆和力量的潮的「影子」，试着让慎平他们重温潮临死前的情景。
</p>
</div>

<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">
<div style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; margin: 15px;"><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/3/38/Summertime_story_10-1.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/e/e0/Summertime_story_10-2.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/2/2b/Summertime_story_10-3.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/9/93/Summertime_story_10-4.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/d/d6/Summertime_story_10-5.jpg" class="moe-img-function" loading="lazy" /><img style="width: 200px; height: 112.5px;" src="https://storage.moegirl.org.cn/moegirl/commons/1/1d/Summertime_story_10-6.jpg" class="moe-img-function" loading="lazy" /></div>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>得知潮死亡真相的慎平。<br />
从潮与潮的「影子」留下的视频来看，鹰巢山上有关于「影子」的线索。<br />
那里有窗的老家菱形医院的旧病房。<br />
三人来到旧病房，院内的蛭子像与通往地下壕沟的暗门出现在了那里。<br />
一行人想往深处行进，但暗门却上了锁。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>慎平、潮、窗被影子包围了起来。但是，「影子」对准的目标只有潮一人。<br />
这时，澪和凸村两人看到了诗织的「影子」，开始追踪她的脚步。而在慎平所在之处，诗织的「影子」指向着一个窨井的下方。澪等人追随着诗织的「影子」，此外，日鹤（龙之介）和根津也目睹了这一切。<br />
而在总算跨过了困境的慎平他们面前出现的，是一位意外的人物——。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>窗的妹妹·朱鹭子说，到现在为止，她一直把喂给蛭子大人的死去的人，称为「食饵」。<br />
所谓蛭子大人，就是夏日祭典那天，在日都岛神社出现的被「大影子」称为「妈妈」的和服少女·波稻。<br />
朱鹭子操纵「影子」，想要阻止慎平他们的计划。<br />
在这个情况下，「大影子」突然出现，将澪绑架为人质。<br />
「大影子」计划着一边让慎平活着一边迎接夏日祭典的日子。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>第五次的7月22日。<br />
恢复意识后，日鹤确信慎平是时间旅行者。<br />
潮用自己的力量告诉了日鹤目前为止的经历后，她相信了慎平并决定和他一起行动。<br />
为了留住诗织的影子，一行人向着小早川家走去，不料日鹤（龙之介）遭到袭击。<br />
全灭的慎平想着重来第六次，然而14年前的世界——存在于日鹤的记忆中。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">14</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">生存还是毁灭</span></div>
<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>日鹤与波稻在过去曾是朋友。但是有一天，波稻因为无法忍受“饥饿”而暴走了。<br />
因为过去发生的一连串的事情，龙之介在日鹤的心中活了下来。<br />
在日鹤记忆中的慎平和潮，回过神来已经回到了突入小早川家之前。<br />
作战中止，当天夜里，慎平把窗等人召集到日都岛中小学，利用潮的力量让大家重温到了目前为止所有循环的经历。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>慎平在体育馆加深了伙伴们的团结，却被「影子」狙击，突然突入第七次循环。<br />
波稻注意到，随着慎平的循环不断重复，起点也逐渐偏离。于是她修改了作战计划，打算彻底除掉慎平。<br />
当晚，为了打倒四手，慎平等人再次聚集在日都岛中小学。<br />
四手则带着很多「影子」来到了这里。「影子」对慎平等人的总力战开始了——。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>顶住了四手率领的「影子」们总攻击的慎平等人，平安地生存了下来。<br />
这时，澪提议让自己的「影子」成为伙伴。通过潮的力量，澪的「影子」被成功引入。<br />
以澪的「影子」和朱鹭子的故事为线索，一行人前往菱形医院。<br />
但是，家里已经是空空如也的状态，什么东西都没有了。<br />
走进医院内通往蛭子洞的参道，出现了窗父母的身影。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>窗的父亲，菱形医院的院长菱形青铜向大家说明了四手的真面目，一行人在医院暂时休息。<br />
第二天早上，一边追寻着「影子」的气息，慎平和潮一边尝试驱除潜藏在岛上的「影子」。<br />
在「影子」的袭击下，慎平等人拯救了陷入危机的孩子们。<br />
之后，慎平向着蛭子大人——日都神社，一切开始的地方行进。
</p>

<div style="display: none;"><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-1.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/4/4f/Summertime_story_18-1.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-2.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/c8/Summertime_story_18-2.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-3.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/8/8c/Summertime_story_18-3.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-4.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/c9/Summertime_story_18-4.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-5.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/c8/Summertime_story_18-5.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span><span class="mw-default-size" typeof="mw:File"><a href="/File:Summertime_story_18-6.jpg" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/e/e3/Summertime_story_18-6.jpg" decoding="async" width="1920" height="1080" class="mw-file-element" data-file-width="1920" data-file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>来到日都神社的慎平，拜访了宫司雁切。慎平给雁切看了70年前的照片，照片上的雁切和现在一样。<br />
慎平质问他是不是就是就是菱形医院的第一任院长菱形纸垂彦。<br />
不久，慎平知道了雁切是为死去的父母报仇的事，想要打倒他，但是在犹豫要不要杀害不是「影子」而是人类的纸垂彦的时候，对雁切的样子产生了某种违和感。
</p>

<div style="color: #2CB2F7; font-weight: 500; font-size:20px;">#<span style="font-size: 24px;">19</span> <span style="font-size: 28.8px; color: black; font-weight: bold;">黑暗制造</span></div>
<div style="max-width: 650px; border-radius: 15px; border: 2px solid #2CB2F7; background-color: #FFFFFF;">

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>失去潮的慎平等人，在绝望的情况下，雁切和波稻出现了新的动向。<br />
根据慎平的联络得知潮死亡的澪和日鹤分别前往慎平指定的汇合处。<br />
和窗一起回到“慎平”身边的澪，等待着她的却是雁切。<br />
另一方面，日鹤前往的地方“慎平”正在等待着她——。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>日鹤与雁切展开了激战。朱鹭子操纵的吉尔和罗森也加入了战斗，战斗变得更加激烈。另一方面，慎平和澪的「影子」前往到另一个雁切身边。<br />
澪的「影子」毫不犹豫地刺杀了纸垂彦，之后根据「影子」的气息移动，出现了快要断气的朱鹭子的身影。朱鹭子说自己被日鹤和根津救了，恳求慎平立刻去找日鹤他们——。
</p>

file-height="1080" /></a></span></div>
<div style="font-size: 17.64px; font-weight: 500; margin: 15px;">
<p>正当慎平因为日鹤的死而陷入绝望之时，菱形青铜出现在了慎平面前。在与青铜的对话中，慎平获得了关于四手的新线索。有一种可能，四手保留了自己的尸体作为备用身体。<br />
接着，慎平想起日都岛夏日祭当天——7月24日，什么都还不知道的潮可能会回来。虽然有迹象表明潮的复活，但波稻和雁切还在试图抓住潮。
</p>
