<div class="mw-heading mw-heading2"><h2 id="原作介绍"><span id=".E5.8E.9F.E4.BD.9C.E4.BB.8B.E7.BB.8D"></span>原作介绍</h2></div>
<div class="mw-heading mw-heading3"><h3 id="剧情简介"><span id=".E5.89.A7.E6.83.85.E7.AE.80.E4.BB.8B"></span>剧情简介</h3></div>
<p>两百年前的蓝河战场，光明帝国最后的军团在魔族的喧嚣声中崩溃，帝国最后的皇帝战死。混乱的西川大陆上没有了共同的君主，群雄并起而混战，武力是生存下去的唯一本钱，制霸天下，是一代代强者的梦想。
</p><p>大陆东南，有一个两百多年的强大势力——紫川家族。他西击流风家，东挡魔族，南镇林家。为了强大的梦想，为了家族血统的薪火相传，无数紫川俊杰前仆后继，谱写了一曲的史诗般壮丽的历史。本文《紫川》，讲述的就是这么一个家族的百年悲歌传奇。
</p>
