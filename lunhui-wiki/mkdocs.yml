site_name: 轮回乐园百科
site_description: 《轮回乐园》世界观百科 · 逐章考据 · 忠于原著
# navigation.instant（即时加载/无闪屏）要求设 site_url。运行时按 location.origin 判断内部链接，
# 故此处填线上地址即可，本地 iframe 同源也照样生效（仅用于满足"必须设"的前提）。
site_url: https://zhushen-space.pages.dev/wiki/
docs_dir: docs
# 内置进前端用 iframe 加载：必须用扁平 .html（false），否则目录式 URL（/wiki/某页/）在 SPA 静态服务下会被
# index.html 兜底重写回游戏本体。false → 每页生成真实 .html 文件 + 相对链接，任何静态/SPA 部署都能正确解析。
use_directory_urls: false
# 构建产物直接落到 zhushen 的 public/wiki/，App 里用 iframe 加载（/wiki/index.html，离线）。
site_dir: ../zhushen-space/zhushen-space/public/wiki

theme:
  name: material
  language: zh
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  features:
    # 即时加载：点条目用 fetch 换内容而非整页重载 → 消除 iframe 切页白屏闪烁（类 SPA 体验）
    - navigation.instant
    - navigation.instant.progress   # 慢网/手机端：>400ms 才显顶部细进度条
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

