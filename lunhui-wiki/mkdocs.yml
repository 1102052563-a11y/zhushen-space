site_name: 轮回乐园百科
site_description: 《轮回乐园》世界观百科 · 逐章考据 · 忠于原著
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  language: zh
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

