name = "zhushen-multiplayer"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 四个 Durable Object：
#   RoomDO  —— 每个房间一个实例（WS 协调 + 房间权威状态）
#   LobbyDO —— 单例（idFromName("global")），公共大厅注册表
#   ChatDO  —— 单例（idFromName("global")），全局实时聊天室（与游戏房解耦）
#   TradeDO —— 单例（idFromName("global")），全局交易行（挂牌 + 还价 公开看板）
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[durable_objects.bindings]]
name = "CHAT"
class_name = "ChatDO"

[[durable_objects.bindings]]
name = "TRADE"
class_name = "TradeDO"

# SQLite 后端：免费计划可用，且是我们算过的低价档
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO", "LobbyDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ChatDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TradeDO"]

# 创意工坊存储（Cloudflare D1，免费额度内基本 $0）。
# 部署前：先 `wrangler d1 create zhushen-workshop`，把它返回的 database_id 填到下面 database_id：
[[d1_databases]]
binding = "DB"
database_name = "zhushen-workshop"
database_id = "ab5a8c23-7f89-4d85-b961-563909602257"
# 云存档复用同一个 D1（DB）——另建一张 cloud_saves 表，无需新建库。

# 云存档大 blob 存储（Cloudflare R2，10GB 免费，专放几十 MB 含图存档）。
# 部署前：先 `wrangler r2 bucket create zhushen-cloud-saves`，下面绑定名保持 CLOUD_BUCKET 即可。
[[r2_buckets]]
binding = "CLOUD_BUCKET"
bucket_name = "zhushen-cloud-saves"

[vars]
# ── 云存档·Discord 登录 ──
# 去 https://discord.com/developers 建 Application，OAuth2 里：
#   ① 复制 Client ID 填到下面 DISCORD_CLIENT_ID；
#   ② Client Secret 用密钥方式放（别进仓库）：`wrangler secret put DISCORD_CLIENT_SECRET`；
#   ③ Redirects 白名单加：https://<你的worker域名>/api/cloud/callback （本地调试再加 http://localhost:8787/api/cloud/callback）
# 留空 = 云存档自动关闭（前端按钮置灰），不影响其它功能。
DISCORD_CLIENT_ID = "1517922396424900799"

# 允许的前端来源（逗号分隔）。留空 = 反射请求来源（本后端无 cookie，可接受）。
# 上线后建议填：https://zhushen-space.pages.dev,http://localhost:5173
ALLOWED_ORIGINS = ""

# ── AI 反代网关（src/gateway.js）──
# AI Studio：无状态多租户——网关不存 key，凭据由每个请求自带。你部署一次，别人各填自己的 key，无需再部署。
# Vertex：🔒锁定「仅本人·本地」——服务账号(SA) 只从 env.VERTEX_SA_JSON 读，放本地 .dev.vars（已 gitignore），
#         跑 `wrangler dev`，前端 Vertex 接口地址指向 http://localhost:8787/api/gw/vertex。
#         公开部署不配 SA → Vertex 自动关闭，SA 永不离开你的机器。
VERTEX_LOCATION = "global"
# Vertex 服务账号三种给法：
#   ① 线上免本地（推荐·仿 SillyTavern）：给 worker 设两个密钥再 deploy —
#        wrangler secret put VERTEX_SA_JSON   # 服务账号 JSON 的 base64
#        wrangler secret put VERTEX_GATE      # 自定义口令；前端 Vertex 接口的 apiKey 填它
#      手机/线上站都能用；SA 不进浏览器、不进仓库；口令防别人盗用你的赠金。
#   ② 本地·导入：前端该接口「📁 导入 JSON」，跑 wrangler dev，地址指向 http://localhost:8787。
#   ③ 本地·.dev.vars：VERTEX_SA_JSON=<base64>（见 .dev.vars.example）。本地（localhost）免口令。
# AI Studio 的 gemini 思考强度（默认 low=轻思考，省 token/快、结构化输出稳）。
#   可选：minimal(更省，仅 3.x Flash) / low / high / none(仅 2.5 系可关) / auto(不注入，交给 gemini 自己定)。
GEMINI_REASONING_EFFORT = "low"
