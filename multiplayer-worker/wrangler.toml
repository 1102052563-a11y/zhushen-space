name = "zhushen-multiplayer"
main = "src/index.js"
compatibility_date = "2026-05-01"

# 两个 Durable Object：
#   RoomDO  —— 每个房间一个实例（WS 协调 + 房间权威状态）
#   LobbyDO —— 单例（idFromName("global")），公共大厅注册表
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

# SQLite 后端：免费计划可用，且是我们算过的低价档
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO", "LobbyDO"]

# 创意工坊存储（Cloudflare D1，免费额度内基本 $0）。
# 部署前：先 `wrangler d1 create zhushen-workshop`，把它返回的 database_id 填到下面 database_id：
[[d1_databases]]
binding = "DB"
database_name = "zhushen-workshop"
database_id = "ab5a8c23-7f89-4d85-b961-563909602257"

[vars]
# 允许的前端来源（逗号分隔）。留空 = 反射请求来源（本后端无 cookie，可接受）。
# 上线后建议填：https://zhushen-space.pages.dev,http://localhost:5173
ALLOWED_ORIGINS = ""

# ── AI 反代网关（src/gateway.js）──
# AI Studio：无状态多租户——网关不存 key，凭据由每个请求自带。你部署一次，别人各填自己的 key，无需再部署。
# Vertex：🔒锁定「仅本人·本地」——服务账号(SA) 只从 env.VERTEX_SA_JSON 读，放本地 .dev.vars（已 gitignore），
#         跑 `wrangler dev`，前端 Vertex 接口地址指向 http://localhost:8787/api/gw/vertex。
#         公开部署不配 SA → Vertex 自动关闭，SA 永不离开你的机器。
VERTEX_LOCATION = "global"
# Vertex 服务账号两种给法（二选一，都只对本地 worker 生效）：
#   ① 最省事：前端该接口点「📁 导入 JSON」选服务账号文件（SA 经本地请求送进本地 worker）；
#   ② 最安全：.dev.vars 配 VERTEX_SA_JSON=<服务账号 JSON 的 base64>（SA 不进浏览器；见 .dev.vars.example，优先级更高）。
# AI Studio 的 gemini 思考强度（默认 low=轻思考，省 token/快、结构化输出稳）。
#   可选：minimal(更省，仅 3.x Flash) / low / high / none(仅 2.5 系可关) / auto(不注入，交给 gemini 自己定)。
GEMINI_REASONING_EFFORT = "low"
