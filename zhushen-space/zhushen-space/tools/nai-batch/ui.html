<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAI 生图工作台</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a3441; --text:#e6edf3; --dim:#8b98a8; --acc:#36d1c4; --acc2:#2aa198; --warn:#e3a008; --err:#f85149; --ok:#3fb950; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 system-ui,"Segoe UI","Microsoft YaHei",sans-serif; }
  header { padding:14px 20px; background:linear-gradient(90deg,#11171f,#0e1116); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:17px; margin:0; letter-spacing:.5px; }
  header h1 b { color:var(--acc); }
  #tokenState { font-size:12px; padding:3px 10px; border-radius:20px; border:1px solid var(--line); color:var(--dim); }
  .wrap { display:grid; grid-template-columns:minmax(420px,1fr) minmax(380px,1.1fr); gap:18px; padding:18px 20px; align-items:start; }
  @media (max-width:980px){ .wrap{ grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:0 0 10px; }
  label { display:block; font-size:12px; color:var(--dim); margin:10px 0 4px; }
  input,textarea,select { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:8px 10px; font:inherit; }
  textarea { resize:vertical; line-height:1.55; }
  input:focus,textarea:focus,select:focus { outline:none; border-color:var(--acc2); }
  .row { display:flex; gap:10px; } .row > * { flex:1; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 0; }
  .chip { font-size:12px; padding:4px 9px; border:1px solid var(--line); border-radius:7px; background:var(--panel2); color:var(--dim); cursor:pointer; }
  .chip:hover { border-color:var(--acc2); color:var(--text); }
  details { margin-top:10px; border-top:1px dashed var(--line); padding-top:8px; }
  details summary { cursor:pointer; color:var(--dim); font-size:12px; }
  .hint { font-size:11px; color:var(--dim); margin-top:4px; }
  .poolBox { border:1px solid var(--acc2); border-radius:10px; padding:12px; margin-top:6px; background:rgba(54,209,196,.05); }
  .poolHead { display:flex; align-items:center; gap:6px; color:var(--text); font-size:13px; margin:0 0 4px; }
  .poolHead input[type=number] { width:54px; padding:3px 6px; }
  .poolHead input[type=checkbox] { width:auto; }
  .actions { display:flex; gap:10px; margin-top:14px; }
  button { font:inherit; border:none; border-radius:9px; padding:10px 16px; cursor:pointer; font-weight:600; }
  #gen { background:var(--acc); color:#04211f; flex:1; }
  #gen:hover { background:var(--acc2); }
  #stop { background:#33202a; color:var(--err); border:1px solid #5a2b35; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #bar { height:6px; background:var(--panel2); border-radius:6px; overflow:hidden; margin-top:12px; border:1px solid var(--line); }
  #barFill { height:100%; width:0; background:linear-gradient(90deg,var(--acc2),var(--acc)); transition:width .3s; }
  #status { font-size:12px; color:var(--dim); margin-top:8px; min-height:18px; }
  .gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  figure { margin:0; background:var(--panel2); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  figure img { width:100%; display:block; aspect-ratio:1216/832; object-fit:cover; background:#0a0d11; cursor:zoom-in; }
  figcaption { font-size:11px; color:var(--dim); padding:5px 8px; display:flex; justify-content:space-between; gap:6px; }
  .tag { font-size:10px; color:var(--acc); padding:0 8px 6px; line-height:1.35; opacity:.85; }
  figure.err { border-color:#5a2b35; } figure.err .ph { aspect-ratio:1216/832; display:flex; align-items:center; justify-content:center; color:var(--err); font-size:12px; padding:10px; text-align:center; }
  figure.pending .ph { aspect-ratio:1216/832; display:flex; align-items:center; justify-content:center; color:var(--dim); }
  .spin { width:22px; height:22px; border:3px solid var(--line); border-top-color:var(--acc); border-radius:50%; animation:s 1s linear infinite; } @keyframes s{to{transform:rotate(360deg)}}
  .banner { background:#3a2a0a; border:1px solid #6b4e10; color:var(--warn); padding:8px 12px; border-radius:8px; font-size:12px; margin:0 20px; }
</style>
</head>
<body>
<header>
  <h1>NAI <b>生图工作台</b></h1>
  <span id="tokenState">读取中…</span>
  <span class="hint" style="margin-left:8px">✎ 你的修改自动保存·刷新不丢</span>
  <span style="flex:1"></span>
  <button id="loadPromptsBtn" style="font-size:12px;background:var(--acc2);color:#04211f;border:none;border-radius:7px;padding:6px 12px;cursor:pointer;font-weight:600">📂 载入提示词</button>
  <button id="saveBtn" style="font-size:12px;background:var(--acc);color:#04211f;border:none;border-radius:7px;padding:6px 12px;cursor:pointer;font-weight:600">💾 保存到服务器</button>
  <button id="resetBtn" style="font-size:12px;background:var(--panel2);color:var(--dim);border:1px solid var(--line);border-radius:7px;padding:6px 12px;cursor:pointer">↺ 恢复默认</button>
</header>
<div id="warn" class="banner" style="display:none"></div>

<div class="wrap">
  <!-- 左：设置 -->
  <div class="panel">
    <h2>① 输出位置</h2>
    <div class="row">
      <div><label>文件夹 folder（输出根下子目录）</label><input id="folder" placeholder="凯莉/阶段3"></div>
      <div style="flex:.6"><label>文件名前缀</label><input id="prefix" placeholder="kaili"></div>
    </div>
    <label>输出根 outBase（相对脚本目录）</label>
    <input id="outBase" placeholder="../../../../图片">
    <div class="chips">
      <span class="chip" data-ob="../../../../图片">图片/（强化看板娘源）</span>
      <span class="chip" data-ob="../../public">public/（普通）</span>
      <span class="chip" data-ob="../../public/portraits">public/portraits/（肖像库）</span>
    </div>
    <div class="row" style="margin-top:10px">
      <div style="flex:.7"><label>尺寸</label>
        <select id="size"><option>1216x832</option><option>832x1216</option><option>1024x1024</option><option>1152x896</option><option>896x1152</option></select>
      </div>
      <div style="flex:.5"><label>起始序号</label><input id="start" type="number" value="1" min="1"></div>
    </div>

    <h2 style="margin-top:18px">② 正向提示词（身份块·所有图共用）</h2>
    <textarea id="positive" rows="6" placeholder="1girl, solo, ... 角色外貌 tags（保人物一致）"></textarea>
    <details>
      <summary>画师 / 质量串（自动前置到正向最前面，可改）</summary>
      <textarea id="artist" rows="3"></textarea>
    </details>

    <h2 style="margin-top:18px">③ 负向提示词（你自己填/改）</h2>
    <textarea id="negative" rows="4"></textarea>

    <h2 style="margin-top:18px">④ 随机正向池（多池·可开关·机械抽取）★</h2>
    <div class="poolBox">
      <div class="row">
        <div style="flex:1">
          <label class="poolHead" style="margin-top:0"><input type="checkbox" id="pool_on" checked> <b>自定义池1</b> · 抽 <input id="drawCount" type="number" value="2" min="0"> 条</label>
          <textarea id="pool" rows="6" placeholder="一行一条；勾选才参与抽取"></textarea>
        </div>
        <div style="flex:1">
          <label class="poolHead" style="margin-top:0"><input type="checkbox" id="pool2_on" checked> <b>自定义池2</b> · 抽 <input id="drawCount2" type="number" value="2" min="0"> 条</label>
          <textarea id="pool2" rows="6" placeholder="一行一条"></textarea>
        </div>
      </div>
      <div id="catPools"></div>
      <label style="display:flex; align-items:center; gap:8px; margin:12px 0 0; cursor:pointer; color:var(--text)">
        <input type="checkbox" id="continuous" style="width:auto"> <b>连续模式</b>：不限张数，每张从所有「开启」的池各随机抽取，一直到「停止」
      </label>
    </div>

    <details>
      <summary>定量参数（连续模式关闭时）/ 高级参数</summary>
      <div class="row" style="margin-top:8px">
        <div style="flex:.5"><label>数量（poses 留空时）</label><input id="count" type="number" value="4" min="1"></div>
        <div style="flex:.5"><label>种子（空=每张随机）</label><input id="seed" placeholder="随机"></div>
        <div style="flex:.5"><label>间隔秒/张</label><input id="gap" type="number" value="3" min="0"></div>
      </div>
      <label>姿势列表（一行一张·按顺序，连续模式下改为随机抽一条）；可留空只用随机池</label>
      <textarea id="poses" rows="4" placeholder="hand on hip, smile, cowboy shot&#10;jumping, action, full body"></textarea>
      <div class="row" style="margin-top:8px">
        <div><label>模型</label><input id="model" value="nai-diffusion-4-5-full"></div>
        <div style="flex:.4"><label>步数</label><input id="steps" type="number" value="28"></div>
      </div>
      <div class="row">
        <div style="flex:.4"><label>scale</label><input id="scale" type="number" value="5" step="0.5"></div>
        <div><label>采样器</label>
          <select id="sampler"><option>k_dpmpp_2m_sde</option><option>k_euler_ancestral</option><option>k_dpmpp_2m</option><option>k_euler</option><option>k_dpmpp_sde</option></select>
        </div>
      </div>
    </details>

    <div class="actions">
      <button id="gen">▶ 生成 / 连续生成</button>
      <button id="stop" disabled>■ 停止</button>
    </div>
    <div id="bar"><div id="barFill"></div></div>
    <div id="status"></div>
  </div>

  <!-- 右：结果 -->
  <div class="panel">
    <h2>结果（点图放大 / 文件已存盘）</h2>
    <div id="gallery" class="gallery"></div>
    <div id="empty" class="hint" style="padding:20px;text-align:center">还没有结果。左侧填好正向+随机池，点「生成」。</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const pad = n => String(n).padStart(2,'0');
const randInt = n => Math.floor(Math.random()*n);
let stopFlag = false;

// ── 本地持久化：网页里的修改自动存 localStorage，刷新/重启不丢 ──
const LS_KEY = 'naiUiState_v1';
const CAT_POOLS = [
  { id:'p3', label:'外观/表情', key:'外观表情' },
  { id:'p4', label:'服装/穿着', key:'服装' },
  { id:'p5', label:'姿势/动作', key:'姿势动作' },
  { id:'p6', label:'场景/光照/构图', key:'场景光照' },
];
const FIELDS = ['folder','prefix','outBase','size','start','positive','artist','negative','poses','pool','pool2','drawCount','drawCount2','count','seed','gap','model','steps','scale','sampler',
  ...CAT_POOLS.map(p=>p.id+'_t'), ...CAT_POOLS.map(p=>p.id+'_n')];
const CHECKS = ['continuous','pool_on','pool2_on', ...CAT_POOLS.map(p=>p.id+'_on')];
function saveState(){ try { const s={}; FIELDS.forEach(f=>{ const el=$(f); if(el) s[f]=el.value; }); CHECKS.forEach(c=>{ const el=$(c); if(el) s[c]=el.checked; }); localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch(e){} }
function applyState(s){ FIELDS.forEach(f=>{ if(s[f]!=null && $(f)) $(f).value=s[f]; }); CHECKS.forEach(c=>{ if(s[c]!=null && $(c)) $(c).checked=!!s[c]; }); }
function resetDefaults(){ if(!confirm('恢复成默认预填？你当前在网页里改的内容会被清掉。')) return; try{ localStorage.removeItem(LS_KEY); }catch(e){} location.reload(); }
function renderCatPools(){
  const box=$('catPools'); if(!box) return;
  box.innerHTML = CAT_POOLS.map(p=>'<div style="margin-top:8px"><label class="poolHead"><input type="checkbox" id="'+p.id+'_on"> <b>'+p.label+'</b> · 抽 <input id="'+p.id+'_n" type="number" value="1" min="0"> 条</label><textarea id="'+p.id+'_t" rows="4" placeholder="一行一条；勾选才参与抽取"></textarea></div>').join('');
}
async function saveToServer(){
  const payload = { folder:$('folder').value, prefix:$('prefix').value, outBase:$('outBase').value, size:$('size').value, start:$('start').value, count:$('count').value, drawCount:$('drawCount').value, drawCount2:$('drawCount2').value, positive:$('positive').value, negative:$('negative').value, poses:$('poses').value, pool:$('pool').value, pool2:$('pool2').value };
  try {
    const r = await (await fetch('/api/save-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})).json();
    if(r.ok) alert('✓ 已保存到服务器 jobs.json：池1 '+r.pool1+' 条、池2 '+r.pool2+' 条。\n现在让我用命令行跑，就会用你这套池子了。');
    else alert('保存失败：'+r.error);
  } catch(e){ alert('保存失败：'+e); }
}
async function loadPrompts(){
  try {
    const r = await (await fetch('/api/prompts')).json();
    if(!r.ok){ alert('载入失败：'+r.error); return; }
    if(!r.lines.length){ alert('prompts.txt 是空的'); return; }
    $('poses').value = r.lines.join('\n');
    saveState();
    alert('已从 '+r.file+' 载入 '+r.lines.length+' 条到「姿势列表」。\n确认上方正向身份块/负向/输出位置后，点 ▶生成 即逐条出图。\n（展开「定量参数」可查看/编辑这些提示词）');
  } catch(e){ alert('载入失败：'+e); }
}

// 从池里不重复随机抽 n 条
function drawFrom(arr, n){
  if(!arr.length || n<=0) return [];
  if(n>=arr.length) return arr.slice();
  const pool=arr.slice(), out=[];
  for(let i=0;i<n;i++) out.push(pool.splice(randInt(pool.length),1)[0]);
  return out;
}

async function loadCfg(){
  try {
    const c = await (await fetch('/api/config')).json();
    $('tokenState').textContent = c.hasToken ? '● Token 已配置' : '○ 未配置 Token';
    $('tokenState').style.color = c.hasToken ? 'var(--ok)' : 'var(--err)';
    if(!c.hasToken){ $('warn').style.display='block'; $('warn').textContent='config.json 未填 apiToken，生成会失败。请先填入 NovelAI 持久化 Token。'; }
    $('artist').value = c.artistTags || '';
    const j = c.lastJob || {};
    $('positive').value = j.prompt || '';
    $('negative').value = j.negative || '';
    $('folder').value = j.folder || '凯莉/测试';
    $('prefix').value = j.prefix || 'kaili';
    $('outBase').value = j.outBase || '../../../../图片';
    if(j.size) $('size').value = j.size;
    if(j.start) $('start').value = j.start;
    $('poses').value = (j.poses || []).join('\n');
    $('pool').value = (j.randomPool || []).join('\n');
    $('pool2').value = (j.randomPool2 || []).join('\n');
    if(j.count) $('count').value = j.count;
    if(j.drawCount) $('drawCount').value = j.drawCount;
    if(j.drawCount2) $('drawCount2').value = j.drawCount2;
    try { const pd = await (await fetch('/api/pool-defaults')).json(); CAT_POOLS.forEach(p=>{ const el=$(p.id+'_t'); if(el && pd[p.key]) el.value = pd[p.key].join('\n'); }); } catch(e){}
    const d = c.defaults || {};
    if(d.model) $('model').value = d.model;
    if(d.steps) $('steps').value = d.steps;
    if(d.scale!=null) $('scale').value = d.scale;
    if(d.sampler) $('sampler').value = d.sampler;
    if(c.gapSec!=null) $('gap').value = c.gapSec;
  } catch(e){ $('tokenState').textContent='配置读取失败'; }
  try { const saved = localStorage.getItem(LS_KEY); if (saved) applyState(JSON.parse(saved)); } catch(e){}  // 用户上次编辑优先于 jobs.json 预填，刷新不丢
  document.addEventListener('input', saveState);
  document.addEventListener('change', saveState);
}

document.querySelectorAll('.chip[data-ob]').forEach(ch=> ch.onclick=()=> $('outBase').value = ch.dataset.ob);

function imgUrl(base,folder,name){
  return '/api/image?base='+encodeURIComponent(base)+'&folder='+encodeURIComponent(folder)+'&name='+encodeURIComponent(name)+'&t='+Date.now();
}

async function generate(){
  const folder=$('folder').value.trim(), prefix=$('prefix').value.trim()||'img', outBase=$('outBase').value.trim();
  const positive=$('positive').value.trim(), negative=$('negative').value.trim(), artist=$('artist').value.trim();
  const size=$('size').value, model=$('model').value.trim(), steps=$('steps').value, scale=$('scale').value, sampler=$('sampler').value;
  const seedRaw=$('seed').value.trim(), gap=Math.max(0,+$('gap').value||0)*1000, start=Math.max(1,+$('start').value||1);
  const poses=$('poses').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const linesOf = id => ($(id)?$(id).value:'').split('\n').map(s=>s.trim()).filter(Boolean);
  const ALLP = [
    { on:$('pool_on').checked, n:Math.max(0,+$('drawCount').value||0), lines:linesOf('pool') },
    { on:$('pool2_on').checked, n:Math.max(0,+$('drawCount2').value||0), lines:linesOf('pool2') },
    ...CAT_POOLS.map(p=>({ on:!!($(p.id+'_on')&&$(p.id+'_on').checked), n:Math.max(0,+($(p.id+'_n')?$(p.id+'_n').value:0)||0), lines:linesOf(p.id+'_t') })),
  ];
  const continuous=$('continuous').checked;
  if(!positive){ alert('正向提示词不能为空'); return; }
  if(!folder){ alert('请填输出文件夹'); return; }
  const anyPool = ALLP.some(p=>p.on && p.lines.length);
  if(continuous && !anyPool && !poses.length && !confirm('连续模式下没开启任何带内容的池、也没姿势，将不停生成。确定继续？')) return;

  const total = continuous ? Infinity : (poses.length ? poses.length : Math.max(1,+$('count').value||1));
  stopFlag=false; $('gen').disabled=true; $('stop').disabled=false; $('empty').style.display='none';
  let ok=0, fail=0, k=0;
  for(k=0; k<total && !stopFlag; k++){
    const idx=start+k, name=prefix+'_'+pad(idx)+'.png';
    // 姿势：连续→随机抽一条；定量→按顺序取
    const pose = poses.length ? (continuous ? poses[randInt(poses.length)] : (poses[k]||'')) : '';
    const extra = ALLP.flatMap(p => p.on ? drawFrom(p.lines, p.n) : []); // 各开启池随机抽
    const tagLine = [pose, ...extra].filter(Boolean).join(', ');
    const finalPos = [positive, tagLine].filter(Boolean).join(', ');
    if(continuous){ $('barFill').style.width=((k%20)/20*100)+'%'; $('status').textContent='连续生成中… 已成功 '+ok+' 张（点停止结束）  →  '+name; }
    else { $('barFill').style.width=Math.round(k/total*100)+'%'; $('status').textContent='生成中 '+(k+1)+'/'+total+'  →  '+name; }
    const fig=addPending(name);
    const seed = continuous ? '' : (seedRaw===''?'':(Number(seedRaw)+k));
    let r;
    try {
      r = await (await fetch('/api/generate-one',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ folder, prefix, outBase, index:idx, positive:finalPos, negative, artistTags:artist, size, model, steps, scale, sampler, seed })})).json();
    } catch(e){ r={ok:false,error:String(e)}; }
    if(r.ok){ fillImg(fig, imgUrl(outBase,folder,name), name, r.kb, tagLine); ok++; }
    else { fillErr(fig, name, r.error); fail++; }
    if(!stopFlag && gap && (continuous || k<total-1)) await sleep(gap);
  }
  $('barFill').style.width='100%';
  $('status').textContent='结束：成功 '+ok+'、失败 '+fail+'，共 '+k+' 次'+(stopFlag?'（已手动停止）':'');
  $('gen').disabled=false; $('stop').disabled=true;
}

function addPending(name){
  const fig=document.createElement('figure'); fig.className='pending';
  fig.innerHTML='<div class="ph"><div class="spin"></div></div><figcaption><span>'+name+'</span><span>…</span></figcaption>';
  $('gallery').prepend(fig); return fig;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function fillImg(fig,url,name,kb,tag){
  fig.className='';
  fig.innerHTML='<img src="'+url+'" title="'+esc(tag)+'" onclick="window.open(this.src)">'
    +'<figcaption><span>'+name+'</span><span>'+(kb||'')+' KB</span></figcaption>'
    +(tag?'<div class="tag">'+esc(tag.slice(0,90))+'</div>':'');
}
function fillErr(fig,name,err){
  fig.className='err';
  fig.innerHTML='<div class="ph">✗ '+esc((err||'失败').slice(0,120))+'</div><figcaption><span>'+name+'</span><span>失败</span></figcaption>';
}

$('resetBtn').onclick=resetDefaults;
$('saveBtn').onclick=saveToServer;
$('loadPromptsBtn').onclick=loadPrompts;
$('gen').onclick=generate;
$('stop').onclick=()=>{ stopFlag=true; $('status').textContent='正在停止…（当前这张完成后停）'; };
renderCatPools();
loadCfg();
</script>
</body>
</html>
