site_name: 《神秘复苏》百科
site_description: 《神秘复苏》世界观百科 · 逐章考据 · 忠于原著
docs_dir: docs
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
